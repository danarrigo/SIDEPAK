name: Desktop CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'desktop/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'desktop/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./desktop

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './desktop/package-lock.json'

    - name: Install dependencies
      run: npm install

    - name: Run Tests
      run: npm run test
