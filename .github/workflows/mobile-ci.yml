name: Mobile CI

on:
  push:
    branches: [ "main", "mobile" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ "main", "mobile" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  test:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./mobile

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java (required for Flutter Android builds)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.27.0'
        cache: true

    - name: Show Flutter version
      run: flutter --version

    - name: Get pub dependencies
      run: flutter pub get

    - name: Verify formatting
      run: dart format --output=none --set-exit-if-changed lib test

    - name: Analyze (fails only on error or warning, not info-level deprecations)
      # Dart's `flutter analyze` exits non-zero on any issue including info-level
      # lints. Filter to error/warning lines so pre-existing info-level
      # `withOpacity` deprecations and `print()` usages do not block CI.
      run: |
        set +e
        OUTPUT=$(flutter analyze 2>&1)
        echo "$OUTPUT"
        ERRORS=$(echo "$OUTPUT" | grep -E '^\s*(error|warning) -' | head -50)
        if [ -n "$ERRORS" ]; then
          echo "::error::Flutter analyze found errors/warnings above"
          exit 1
        fi
        exit 0

    - name: Run unit + widget tests
      run: flutter test --reporter expanded

    - name: Upload coverage (if configured)
      if: always()
      run: |
        echo "Coverage artifact collection can be added here if lcov is enabled."
        # flutter test --coverage produces coverage/lcov.info
